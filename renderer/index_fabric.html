      .print-root {
        page-break-inside: avoid;

      }

        border-bottom: none !important;
        grid-column: 2 / -1;
        font-size: 16px;

      }

        border-bottom: none !important;
        grid-column: 2 / -1;
        font-size: 16px;

      }

      .page-break {
        page-break-after: always;
        break-after: page;
        height: 0;
      }

      /* ===== PRINT 3.9in × 3.9in (mỗi hàng là 1 grid độc lập + block-8 gộp cột phải) ===== */

        size: 4in 4in;
        margin: 0;
      }

      html,
      body {
        width: 100%;
        margin: 0;
        padding: 0;
        background: #fff;
        -webkit-print-color-adjust: exact !important;

      }

      /* Ẩn phần thừa nếu lỡ chèn */
      .btn,
      button,
      #modal-loading,
      #modal-preview,
      #rid-list {
        display: none !important;
      }

      /* KHUNG tem: cố định theo inch, không đặt height để tránh nén */
      .preview-content {
        border: 1px solid #000;
        background: #fff;
        width: 3.9in;
        margin-left: 0.05in;
        margin-top: 0.05in;
        box-sizing: border-box;
        font-size: 10px;
        /* gọn vừa tem */
        overflow: hidden;
        line-height: 1;
      }

      /* ====== HÀNG CHÍNH (QC ROW) ====== */
      .preview-content .qc-row {
        display: grid;
        border-bottom: 1px solid #000;
        width: 100%;
      }

      .preview-content .qc-row:last-child {
        border-bottom: none;
      }

      /* Ô (cell) — padding nhỏ để tiết kiệm chỗ */
      .preview-content .cell {
        border-right: 1px solid #000;
        padding: 1px 1px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        box-sizing: border-box;
        word-break: break-word;
        min-height: 18px;
        /* vừa mắt bản in nhỏ */
      }

      .preview-content .qc-row .cell:last-child {
        border-right: none;
      }

      /* Căn lề phụ và chữ */
      .preview-content .cell.left-label {
        justify-content: flex-start;
        text-align: left;
      }

      .preview-content .cell.right {
        justify-content: flex-end;
        text-align: right;
      }

      .preview-content .cell.bold {
        font-weight: 700;
      }

      .preview-content .cell.italic {
        font-style: italic;
      }

      .preview-content .cell.small {
        font-size: 9px;
      }

      .preview-content .cell.text-lg {
        font-size: 12px;
      }

      /* Tiện ích span (trong phạm vi 1 hàng) */
      .preview-content .c-span-2 {
        grid-column: span 2;
      }

      .preview-content .c-span-3 {
        grid-column: span 3;
      }

      .preview-content .c-span-4 {
        grid-column: span 4;
      }

      .preview-content .c-span-5 {
        grid-column: span 5;
      }

      .preview-content .c-span-7 {
        grid-column: span 7;
      }

      .preview-content .c-span-all {
        grid-column: 1 / -1;
      }

      /* Input (phòng khi còn sót) */
      .preview-content .cell input[type="text"] {
        width: 100%;
        padding: 1px 1px;
        border: 1px solid #777;
        outline: none;
        box-sizing: border-box;
        text-align: center;
      }

      /* Ảnh theo đơn vị inch để luôn chuẩn tỉ lệ khi in */
      .preview-content .barcode {
        width: 1.2in;
        height: 0.5in;
        /* tăng nhẹ cho rõ nét */
        object-fit: contain;
        display: block;
        margin: 0 auto;
        image-rendering: -webkit-optimize-contrast;
      }

      .preview-content .sign {
        width: 0.22in;
        height: 0.22in;
        object-fit: contain;
        display: block;
        margin: 0 auto;
      }

      /* Cỡ chữ chuyên biệt */
      .preview-content .cell.passfail {
        font-size: 9px;
        line-height: 1;
      }

      .preview-content .cell.passfailn {
        font-size: 7.5px;
        line-height: 1;
      }

      .preview-content .cell.passbig {
        font-size: 10px;
        line-height: 1;
      }

      .preview-content .cell.passsobigi {
        font-size: 12.5px;
        line-height: 1;
      }

      .preview-content .cell.passsobigs {
        font-size: 14px;
        line-height: 1;
      }

        font-size: 8px !important;
        line-height: 1;
      }

      .preview-content .cell.passsobig {
        font-size: 12.5px !important;
        line-height: 1;
      }

      /* ====== ĐỊNH NGHĨA CỘT THEO TỪNG HÀNG ====== */
      .preview-content .row-1 {
        grid-template-columns: 32% repeat(7, 1fr);
      }

      .preview-content .row-2 {
        grid-template-columns: 32% repeat(7, 1fr);
      }

      .preview-content .row-3 {
        grid-template-columns: 32% repeat(7, 1fr);
      }

      .preview-content .row-4 {
        grid-template-columns: 32% repeat(7, 1fr);
      }

      .preview-content .stub {
        background: #fafafa;
      }

      .preview-content .row-5 {
        grid-template-columns: 32% repeat(4, 1fr) repeat(3, 1fr);
      }

      .preview-content .barcode-cell.h-tall {
        min-height: 0.23in;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .preview-content .row-6 {
        grid-template-columns: 32% repeat(2, 1fr) repeat(2, 1fr) repeat(3, 1fr);
      }

      .preview-content .no-top-border {
        border-top: none;
      }

      .preview-content .row-7 {
        grid-template-columns: 32% repeat(7, 1fr);
      }

      /* ===== Khối H8 gộp cột phải (Tem tháng) — Y HỆT bản màn hình ===== */
      .preview-content .block-8 {
        display: grid;
        grid-template-columns: 32% 20% 10% 1fr;
        /* label | đạt | không đạt | cột Tem tháng */
        border-bottom: 1px solid #000;
        width: 100%;
        box-sizing: border-box;
      }

      /* Cell trong block-8 (3 cột bên trái) */
      .preview-content .block-8 .cell {
        border-right: 1px solid #000;
        padding: 2px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        box-sizing: border-box;
        word-break: break-word;
      }

      /* Căn trái cho label */
      .preview-content .block-8 .cell.left-label {
        justify-content: flex-start;
        text-align: left;
      }

      /* Thêm đường kẻ ngang giữa các hàng cho 3 cột bên trái */
      .preview-content .block-8 .cell:not(.col-4) {
        border-bottom: 1px solid #000;
      }

      /* Bỏ đường kẻ ngang ở hàng cuối cùng bên trái để khớp tổng thể (đặt class no-bb vào 3 cell hàng cuối) */
      .preview-content .block-8 .no-bb {
        border-bottom: none;
      }

      /* ===== Cột phải gộp (Tem tháng) — 1 ô duy nhất span 6 hàng ===== */
      .preview-content .block-8 .col-4 {
        grid-column: 4;
      grid-row: 1 / span 6 !important;
        /* ăn trọn từ hàng 1 đến hàng 6 của khối H8 */
        border-left: 1px solid #000;
        /* border-right: giữ nguyên (đường viền phải ngoài cùng), có thể bỏ nếu muốn dựa vào border khung ngoài */
        padding: 1px;
        /* để nội dung bên trong chiếm trọn */
        display: flex;
        flex-direction: column;
      }

      /* Nội dung bên trong cột phải */
      .preview-content .month-title {
        font-weight: 700;
        justify-content: center;
        padding: 1px 1px;
        display: flex;
        align-items: center;
        border-bottom: 1px solid #000;

      /* Khung vuông nối liền (không border trên/dưới theo yêu cầu cũ – chỉ cần trái/phải do .col-4 đảm nhiệm)
   Nhưng để có khung riêng, ta vẫn vẽ border dưới để khép ô phải. Nếu bạn muốn không có border dưới,
   chỉ cần bỏ dòng border-bottom dưới đây. */
      .preview-content .seal-box {
        aspect-ratio: 5/6;
        width: 100%;
        min-height: 0;
        /* Không cần top/bottom vì month-box đã có border-bottom; col-4 tạo khung trái/phải */
      }
      /* ===== MONTH STAMP ===== */
      #preview-content .month-box,
      .preview-content .month-box {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(4, 1fr);
        gap: 2px;
        padding: 3px;
      }

      #preview-content .month-dot,
      .preview-content .month-dot {
        border: 1px solid #000;
        border-radius: 999px;
        aspect-ratio: 1/1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 10px;
        line-height: 1;
      }

      #preview-content .month-dot.is-active,
      .preview-content .month-dot.is-active {
        outline: 2px solid #000;
        outline-offset: 1px;
      }

      #preview-content .month-box,
      .preview-content .month-box {
        display: none !important;
      }

      /* tem tháng (1 cái) */
      #preview-content .seal-box,
      .preview-content .seal-box {
        display: flex;

        justify-content: center;
      }

      .preview-content .block-8 {
        font-size: 10px;
        /* nhỏ toàn khối */
      }

      .preview-content .block-8 .cell {
        padding: 1px;
        /* giảm padding -> khối thấp hơn */
        min-height: 12px;
        line-height: 1;
      }

      /* Tiêu đề "月份 Tem tháng" nhỏ lại */
      .preview-content .block-8 .month-title {
        font-size: 10px;
        padding: 1px 1px;
        min-height: 27px;
        /* từ ~102px xuống gọn hơn */
      }

      /* Ô dấu vuông ở cột phải: thu nhỏ gọn hơn */
      .preview-content .block-8 .seal-box {
        aspect-ratio: 5/6;
        width: 85%;
        /* nhỏ bề ngang -> nhỏ đồng thời bề dọc nhờ aspect-ratio */
        margin: 6px auto;
        /* canh giữa theo chiều ngang */
        /* Nếu vẫn còn cao, có thể hạ xuống 75% hoặc 70% */
      }

      /* H8.7: Chữ ký QC — 4 cột giống pattern các hàng H8-x */
      .preview-content .row-8-7 {
        grid-template-columns: 32% 20% 10% 1fr;
      }

#preview-content .row-footer .cell,

    <script>
      (function () {
        const modal = document.getElementById("confirm-modal");
        const titleEl = document.getElementById("confirm-title");
        const msgEl = document.getElementById("confirm-message");
        const btnOk = document.getElementById("confirm-ok");
        const btnCancel = document.getElementById("confirm-cancel");

        if (!modal) {
          console.error("Confirm modal not found");
          return;
        }

        window.confirmBox = function ({
          title = "Confirm",
          message = "Are you sure?",
          okText = "OK",
          cancelText = "Cancel",
          danger = true,
        } = {}) {
          return new Promise((resolve) => {
            titleEl.textContent = title;
            msgEl.textContent = message;
            btnOk.textContent = okText;
            btnCancel.textContent = cancelText;

            btnOk.className = danger
              ? "px-4 py-2 rounded-xl bg-red-600 text-white text-sm font-semibold hover:bg-red-700 active:scale-95 transition"
              : "px-4 py-2 rounded-xl bg-sky-600 text-white text-sm font-semibold hover:bg-sky-700 active:scale-95 transition";

            modal.classList.remove("hidden");
            modal.classList.add("flex");

            function cleanup(result) {
              modal.classList.add("hidden");
              modal.classList.remove("flex");

              btnOk.removeEventListener("click", onOk);
              btnCancel.removeEventListener("click", onCancel);
              modal.removeEventListener("click", onBackdrop);

              resolve(result);
            }

            function onOk() {
              cleanup(true);
            }
            function onCancel() {
              cleanup(false);
            }
            function onBackdrop(e) {
              if (e.target === modal) cleanup(false);
            }

            btnOk.addEventListener("click", onOk);
            btnCancel.addEventListener("click", onCancel);
            modal.addEventListener("click", onBackdrop);
          });
        };
      })();

      function showToastSuccess(msg) {
        Toastify({
          text: msg,
          duration: 3000,
          gravity: "bottom",
          position: "right",
          style: { background: "#4BB543" },
        }).showToast();
      }

      function showToastError(msg) {
        Toastify({
          text: msg,
          duration: 4000,
          gravity: "bottom",
          position: "right",
          style: { background: "#dc2626" },
        }).showToast();
      }

      function showToastWarning(msg) {
        Toastify({
          text: msg,
          duration: 4000,
          gravity: "bottom",
          position: "right",
          style: { background: "#linear-gradient(to right, #f59e0b, #d97706" },
        }).showToast();
      }
    </script>
