/* ===== NEON DOTS ===== */
.neon-dots{
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: -3;
}

.neon-dots span{
  position: absolute;
  width: 8px; /* Kích thước lớn hơn để hiệu ứng rõ nét */
  height: 8px; 
  border-radius: 50%;
  filter: blur(2px); /* Làm cho ánh sáng lan tỏa mạnh hơn */
  animation: dotMove 10s linear infinite;
  box-shadow: 0 0 20px, 0 0 30px, 0 0 40px; /* Tạo độ sáng xung quanh */
}

/* Từng dot */
.neon-dots span:nth-child(1){
  background: #22ffe6;
  box-shadow: 0 0 10px #22ffe6, 0 0 20px #22ffe6, 0 0 40px #22ffe6;
  animation-duration: 8s;
}
.neon-dots span:nth-child(2){
  background: #7c7cff;
  box-shadow: 0 0 10px #7c7cff, 0 0 20px #7c7cff, 0 0 40px #7c7cff;
  animation-duration: 9s;
}
.neon-dots span:nth-child(3){
  background: #38bdf8;
  box-shadow: 0 0 10px #38bdf8, 0 0 20px #38bdf8, 0 0 40px #38bdf8;
  animation-duration: 11s;
}
.neon-dots span:nth-child(4){
  background: #a855f7;
  box-shadow: 0 0 10px #a855f7, 0 0 20px #a855f7, 0 0 40px #a855f7;
  animation-duration: 13s;
}

@keyframes dotMove {
  0% { transform: translate(10vw, 15vh); }
  25% { transform: translate(80vw, 20vh); }
  50% { transform: translate(60vw, 80vh); }
  75% { transform: translate(20vw, 60vh); }
  100% { transform: translate(10vw, 15vh); }
}

/* ===== SCANLINE EFFECT ===== */
.scanline {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: -1;
}
.scanline::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, transparent 0%, rgba(255, 255, 255, 0.035) 50%, transparent 100%);
  animation: scan 7s linear infinite;
}

@keyframes scan {
  0% { transform: translateY(-100%); }
  100% { transform: translateY(100%); }
}

    <script>
      let preFactory = null;

      document.addEventListener("DOMContentLoaded", async () => {
        const lang = localStorage.getItem("app_lang") || "en";
        await window.i18n.loadLang(lang);

        const ctx = await window.kbAPI.getAppContext();
        preFactory = ctx?.factory;

        document.querySelectorAll("[data-i18n]").forEach((el) => {
          const key = el.dataset.i18n;
          el.textContent = window.i18n.t(key);
        });
      });
      const FACTORY_LABEL_MAP = {
        GL1: "lianying",
        GL2: "lianshun1",
        GL3: "lianshun2",
        GL4: "cambodia",
      };
      let timer = null;
      let lastKey = "";

      function showLoading(show) {
        const el = document.getElementById("loading");
        if (!el) return;
        el.classList.toggle("hidden", !show);
      }

      const userInput = document.getElementById("username");
      const passInput = document.getElementById("password");

      const msg = document.getElementById("login-msg");

      function showMsg(text, ok = false) {
        msg.textContent = text;
        msg.className = ok
          ? "text-sm text-green-600 mt-3"
          : "text-sm text-red-600 mt-3";
        msg.classList.remove("hidden");
      }

      function hideMsg() {
        msg.classList.add("hidden");
      }

      let lastLoginRes = null;

      async function autoLoginCheck() {
        const user = userInput.value.trim();
        const pass = passInput.value.trim();
        if (!user || !pass) return;

        hideMsg();
        showLoading(true);

        const res = await window.kbAPI.login({ user, password: pass });
        showLoading(false);

        if (!res?.success) {
          showMsg(`❌ ${res.message || "Đăng nhập thất bại"}`);
          return;
        }

        lastLoginRes = res;

        // Hiển thị dropdown layout
        document.getElementById("layout-box").classList.remove("hidden");

        // Kiểm tra nếu layout có giá trị hợp lệ (mặc định là Da)
        btnLogin.disabled = !layoutSelect.value; // Chỉ enable khi layout đã chọn
      }

      const layoutSelect = document.getElementById("layoutSelect");
      const layoutSelectValue = layoutSelect?.value;

      layoutSelect.addEventListener("change", () => {
        btnLogin.disabled = !layoutSelect.value;
      });

      // debounce 0.5s khi gõ password
      passInput.addEventListener("input", () => {
        clearTimeout(timer);
        timer = setTimeout(autoLoginCheck, 500);
      });

      btnLogin.addEventListener("click", async () => {
        const user = userInput.value.trim();
        const password = passInput.value;
        const remember = !!document.getElementById("remember")?.checked;

        if (!preFactory) {
          showMsg("Missing factory context");
          return;
        }

        // Cập nhật layout từ dropdown trước khi gửi request
        const layoutSelectValue = layoutSelect?.value; // Lấy lại giá trị layout mới nhất

        const res = await window.kbAPI.login({ user, password });

        window.kbAPI.loginSuccess({
          user,
          factory: preFactory, // Từ PRELOGIN
          remember,
          employee_name: String(res?.employee_name || ""),
          layout: layoutSelectValue, // Gửi giá trị layout mới nhất
        });
      });
    </script>
