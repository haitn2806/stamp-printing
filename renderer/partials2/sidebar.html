<!-- Inspection Sidebar (Electron) -->
<style>
  /* ===== SIDEBAR QTY COLUMNS ===== */

.defect-table th.sidebar-poqty-head {
  background: linear-gradient(180deg, #f59e0b, #d97706);
  color: #ffffff;
  font-weight: 800;
  letter-spacing: 0.3px;
  border-left: 2px solid #b45309;
  border-right: 1px solid #fbbf24;
  white-space: nowrap;
}

.defect-table th.sidebar-checkedqty-head {
  background: linear-gradient(180deg, #10b981, #059669);
  color: #ffffff;
  font-weight: 800;
  letter-spacing: 0.3px;
  border-left: 2px solid #047857;
  border-right: 2px solid #047857;
  white-space: nowrap;
}

.defect-table th.sidebar-poqty-filter {
  background: #fffbeb;
  border-left: 2px solid #f59e0b;
}

.defect-table th.sidebar-checkedqty-filter {
  background: #ecfdf5;
  border-right: 2px solid #10b981;
}

/* PO Qty data */
.defect-table td.sidebar-poqty-cell {
  background: #fffbeb;
  text-align: right;
  padding: 6px 8px;
  border-left: 2px solid #f59e0b;
  border-right: 1px solid #fde68a;
}

/* Checked Qty data */
.defect-table td.sidebar-checkedqty-cell {
  background: #ecfdf5;
  text-align: right;
  padding: 6px 8px;
  border-left: 1px solid #a7f3d0;
  border-right: 2px solid #10b981;
}

.sidebar-qty-pill {
  display: inline-flex;
  min-width: 92px;
  justify-content: flex-end;
  align-items: center;
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  line-height: 1;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06);
}

.sidebar-poqty-pill {
  background: #fef3c7;
  color: #92400e;
  border: 1px solid #f59e0b;
}

.sidebar-checkedqty-pill {
  background: #d1fae5;
  color: #065f46;
  border: 1px solid #10b981;
}

/* Hover vẫn giữ nổi bật */
.defect-table tbody tr:hover td.sidebar-poqty-cell {
  background: #fde68a;
}

.defect-table tbody tr:hover td.sidebar-checkedqty-cell {
  background: #a7f3d0;
}
</style>


<div id="inspection-sidebar"
     class="fixed top-0 left-0 h-full w-full sm:w-[750px] md:w-[1300px]
            bg-white border-r border-gray-200 shadow-2xl rounded-r-2xl
            transform -translate-x-full transition-transform duration-300
            z-[1050] flex flex-col">

  <!-- Header -->
  <div class="sidebar-report-header sticky top-0 flex items-center justify-between gap-3 px-5 py-[27px]">
  <!-- Left: icon + title -->
  <div class="flex items-center gap-3 ml-4 text-white">
    <!-- Magnifying glass icon -->
    <span class="inline-flex items-center justify-center w-10 h-10 rounded-xl bg-white/20 backdrop-blur">
<span class="inline-flex items-center justify-center w-10 h-10 rounded-xl bg-white/20 backdrop-blur">
  <svg xmlns="http://www.w3.org/2000/svg"
       viewBox="0 0 24 24"
       fill="none"
       stroke="currentColor"
       stroke-width="2"
       stroke-linecap="round"
       stroke-linejoin="round"
       class="w-6 h-6">
    <circle cx="11" cy="11" r="8"/>
    <path d="M21 21l-4.3-4.3"/>
  </svg>
</span>

    </span>

    <h2 class="text-3xl sm:text-2xl font-semibold mb-0 leading-none">
      Report Inspection
    </h2>
  </div>

  <!-- Close button -->
  <button
    id="sidebar-close"
    type="button"
    class="inline-flex items-center justify-center w-10 h-10 rounded-full
           bg-white/20 text-white border border-white/30
           backdrop-blur transition hover:bg-white/30 active:scale-90"
    aria-label="Close sidebar"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="h-5 w-5"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
    >
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M6 18L18 6M6 6l12 12" />
    </svg>
  </button>
</div>


  <!-- Body -->
  <div class="flex-1 p-4">
    <div class="table-scroll">
      <table
        class="defect-table">
        <thead class="sidebar-table-head">
          <tr class="">
            <th class="px-3 py-2 text-center font-bold "data-i18n="table.created">Created</th>
            <th class="px-3 py-2 text-center font-bold">Inspection #</th>
            <th class="px-3 py-2 text-center font-bold">PO</th>
            <th class="px-3 py-2 text-center font-bold" data-i18n="material">Vendor</th>
            <th class="px-3 py-2 text-center font-bold" data-i18n="manufacturer">Material</th>
<th class="px-3 py-2 text-center font-bold" data-i18n="delivery.date">Delivery Date</th>
<th class="px-3 py-2 text-center font-bold sidebar-poqty-head" >PO Qty</th>
<th class="px-3 py-2 text-center font-bold sidebar-checkedqty-head">Checked Qty</th>
<th class="px-3 py-2 text-center font-bold w-16" data-i18n="table.action">Action</th>
          </tr>

          <tr class="defect-total">
            <th class="px-2 py-2">
              <input type="text" id="filter-created"
                class="w-full rounded-md border border-gray-300 px-2 py-1 text-sm focus:border-sky-300 focus:ring-2 focus:ring-sky-500" />
            </th>
            <th class="px-2 py-2">
              <input type="text" id="filter-ri-no"
                class="w-full rounded-md border border-gray-300 px-2 py-1 text-sm focus:border-sky-300 focus:ring-2 focus:ring-sky-500" />
            </th>
            <th class="px-2 py-2">
              <input type="text" id="filter-po"
                class="w-full rounded-md border border-gray-300 px-2 py-1 text-sm focus:border-sky-300 focus:ring-2 focus:ring-sky-500" />
            </th>
            <th class="px-2 py-2">
              <input type="text" id="filter-vendor"
                class="w-full rounded-md border border-gray-300 px-2 py-1 text-sm focus:border-sky-300 focus:ring-2 focus:ring-sky-500" />
            </th>
            <th class="px-2 py-2">
              <input type="text" id="filter-material"
                class="w-full rounded-md border border-gray-300 px-2 py-1 text-sm focus:border-sky-300 focus:ring-2 focus:ring-sky-500"  />
            </th>
            <th class="px-2 py-2">
              <input type="date" id="filter-date"
                class="w-full rounded-md border border-gray-300 px-2 py-1 text-sm focus:border-sky-300 focus:ring-2 focus:ring-sky-500" />
            </th>
            <th></th>
<th></th>
            <th></th>
          </tr>
        </thead>

        <tbody id="sidebar-inspection-table">
         <tr class="defect-total">
  <td colspan="9" class="text-center p-6">
    <img src="./assets/search.gif"
         alt="Loading"
         class="mx-auto w-24 h-24" />
  </td>
</tr>
<div id="po-tooltip"
     style="display:none; position:fixed; z-index:9999;"
     class="max-w-[520px] rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm shadow-xl break-words">
</div>
        </tbody>
      </table>
    </div>
  </div>
</div>
