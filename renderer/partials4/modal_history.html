<style>
/* ============================= */
/* 🧾 HISTORY MODAL – NEW UI MATCH */
/* ============================= */

#history-modal {
  
  animation: fadeIn .18s ease-out;
   font-size: 14px !important; /* ⬅️ base nhỏ hơn */
}
#history-modal h2 {
  font-size: 1.2rem !important; /* ~18px (từ 20–24px) */
}

#btn-close-history {
  font-size: 18px !important;
}
#modal-history-table thead th {
  line-height: 1.1 !important;
  font-size: 13px;      /* ⬅️ từ text-base / text-lg */
  padding-top: 6px;
  padding-bottom: 6px;
}

#modal-history-table tbody td {
  font-size: 14px;
  padding-top: 6px;
  padding-bottom: 6px;
}

.history-total-row td {
  font-size: 13px;
}

#history-rows input {
  font-size: 13px;   /* ⬅️ gọn nhưng vẫn rõ */
}
#btn-save-history {
  font-size: 13px;
  padding: 6px 14px;   /* thấp lại */
}

/* Overlay */
#history-modal > .absolute {
  background: rgba(15, 23, 42, 0.55);
  backdrop-filter: blur(8px);
}

/* Dialog */
#history-modal .max-w-6xl {
  box-shadow:
    /* shadow chính */
    0 40px 90px rgba(15, 23, 42, 0.45),

    /* viền sáng phía trên (glass) */
    inset 0 1px 0 rgba(255,255,255,0.45),

    /* viền tối rất nhẹ */
    inset 0 0 0 1px rgba(15,23,42,0.06);
}


/* ============================= */
/* HEADER – GLASS / SKY */
/* ============================= */

#history-modal .sticky {
   padding-top: 0.75rem;
  padding-bottom: 0.75rem;
  background: linear-gradient(
    135deg,
    rgba(255,255,255,.85),
    rgba(255,255,255,.75)
  );
  backdrop-filter: blur(10px);
   box-shadow:
    0 1px 0 rgba(255,255,255,0.5),
    0 6px 18px rgba(15,23,42,0.18);
}

#history-modal h2 {
  letter-spacing: -0.02em;
  font-weight: 600;
}

/* Close */
#btn-close-history {
  font-size: 22px;
  line-height: 1;
  background: rgba(255,255,255,.9);
}

#btn-close-history:hover {
  background: #fee2e2;
  color: #dc2626;
  box-shadow: 0 6px 18px rgba(239,68,68,.35);
}

/* ============================= */
/* TABLE – SOFT / CLEAN */
/* ============================= */

#modal-history-table {
  border-radius: 16px;
  overflow: hidden;
}

/* header */
#modal-history-table thead th {
  background: #f8fafc;
  font-weight: 600;
  color: #334155;
}

/* zebra */
#history-rows tr:nth-child(odd) {
  background: #ffffff;
}
#history-rows tr:nth-child(even) {
  background: #f8fafc;
}

/* ============================= */
/* INPUT – SOFT SHADCN */
/* ============================= */

#history-rows input {
  width: 100%;
  height: 36px;    
  padding: 0 10px;

  background: rgba(255,255,255,.9);
  border: 1px solid rgba(226,232,240,.9);
  border-radius: 12px;

  text-align: center;
  font-size: 14px;
  font-weight: 500;
  color: #0f172a;

  box-shadow:
    inset 0 1px 2px rgba(15,23,42,.08),
    0 1px 0 rgba(255,255,255,.6);

  outline: none;
  transition: all .15s ease;
}

#history-rows input:focus {
  border-color: #0ea5e9;
  box-shadow:
    0 0 0 3px rgba(14,165,233,.25),
    inset 0 1px 2px rgba(15,23,42,.08);
}

/* ============================= */
/* DIFF COLUMN – SOFT AMBER */
/* ============================= */

#history-rows td.diff-cell {
  background: linear-gradient(
    180deg,
    #fef3c7,
    #fde68a
  );
}

#history-rows .diff-output {
  background: transparent;
  border: none;
  font-weight: 600;
  color: #92400e;
  cursor: not-allowed;
  box-shadow: none;
}

/* ============================= */
/* TOTAL ROW – HARMONY */
/* ============================= */

.history-total-row {
  background: linear-gradient(
    135deg,
    rgba(14,165,233,.12),
    rgba(99,102,241,.12)
  );
}

.history-total-row td {
  font-weight: 600;
  color: #0f172a;
}

/* ============================= */
/* SAVE BUTTON – CONSISTENT */
/* ============================= */

#btn-save-history {
  border-radius: 14px;
  box-shadow:
    0 10px 26px rgba(14,165,233,.35);
}

#btn-save-history:hover {
  box-shadow:
    0 14px 36px rgba(14,165,233,.45);
}

/* ============================= */
/* ANIMATION */
/* ============================= */

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@keyframes slideUp {
  from {
    transform: translateY(14px) scale(.97);
    opacity: 0;
  }
  to {
    transform: translateY(0) scale(1);
    opacity: 1;
  }
}

</style>

<!-- History Modal (Electron - HTML/JS thuần) -->
<div id="history-modal" class="fixed inset-0 z-50 hidden">
  <!-- Overlay -->
  <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" data-close="history"></div>

  <!-- Dialog -->
  <div class="relative z-10 flex min-h-full items-center justify-center p-4">
    <div class="w-[90%] max-w-6xl max-h-[90vh] overflow-hidden rounded-2xl border border-gray-200 bg-white shadow-2xl">
      <!-- Header -->
      <div class="sticky top-0 flex items-center justify-between gap-2 border-b border-gray-200 bg-white/80 px-6 py-4 backdrop-blur">
        <h2 class="text-xl md:text-2xl font-semibold text-gray-900" data-i18n="action.history">
          Log History 
        </h2>

        <button id="btn-close-history" type="button"
          class="inline-flex h-10 w-10 items-center justify-center rounded-full border border-gray-300 bg-white text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-sky-500">
          &times;
        </button>
      </div>

      <!-- Body -->
      <div class="px-6 py-4 overflow-auto" style="max-height: calc(90vh - 80px);">
        <div class="overflow-x-auto rounded-xl border border-gray-200">
          <table id="modal-history-table"
            class="min-w-full table-auto text-center border-collapse
                   [&>thead>tr>th]:border [&>thead>tr>th]:border-gray-200
                   [&>tbody>tr>td]:border [&>tbody>tr>td]:border-gray-200">
            <thead class="bg-gray-50">
              <tr class="border-b border-gray-200">
                <th colspan="4" class="px-3 py-2 text-base md:text-lg font-semibold text-gray-900" data-i18n="history.tare_weight">
                  Tare weight record
                </th>
                <th colspan="3" class="px-3 py-2 text-base md:text-lg font-semibold text-gray-900" data-i18n="history.thickness">
                  Thickness record
                </th>
              </tr>

              <tr class="border-b border-gray-200 text-gray-700">
                <th class="px-3 py-2 w-24 text-base md:text-lg font-medium">#</th>
                <th class="px-3 py-2 w-32 text-base md:text-lg font-medium" data-i18n="history.original_size">Original size</th>
                <th class="px-3 py-2 text-base md:text-lg font-medium" data-i18n="history.actual_size">Actual size</th>
                <th class="px-3 py-2 text-base md:text-lg font-medium" data-i18n="history.deviation">Deviation</th>
                <th class="px-3 py-2 text-base md:text-lg font-medium" data-i18n="history.collar">Collar</th>
                <th class="px-3 py-2 text-base md:text-lg font-medium" data-i18n="history.heel_counter">Heel counter</th>
                <th class="px-3 py-2 text-base md:text-lg font-medium" data-i18n="history.seat">Seat</th>
              </tr>
            </thead>

            <tbody id="history-rows">
              <!-- JS sẽ render 10 dòng ở đây -->
            </tbody>

            <tbody>
              <tr class="history-total-row font-semibold text-gray-900">
                <td class="border-t border-gray-200 px-3 py-2 text-lg">Total</td>
                <td class="border-t border-gray-200 px-3 py-2 text-lg"><span id="sum-origin">0</span></td>
                <td class="border-t border-gray-200 px-3 py-2 text-lg"><span id="sum-actual">0</span></td>
                <td class="border-t border-gray-200 px-3 py-2 text-lg"><span id="sum-diff">0</span></td>
                <td class="border-t border-gray-200 px-3 py-2 text-lg" colspan="3" >
                  <span data-i18n="history.shortage_rate"></span>
                  <span id="shortage-rate" class="text-red-600">0%</span>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="mt-4 flex justify-end">
<button id="excel-download-sole" type="button" class="mr-3 inline-flex items-center gap-2 rounded-xl bg-sky-600 px-4 py-2 text-sm font-medium text-white shadow">
 <svg viewBox="0 0 24 24"
       class="h-4 w-4 excel-icon"
       xmlns="http://www.w3.org/2000/svg">
    <rect x="3" y="3" width="18" height="18" rx="3"
          fill="#16A34A"/>
    <path d="M9 7l2.5 5L9 17h2l1.5-3.5L14 17h2l-2.5-5L16 7h-2l-1.5 3.5L11 7H9z"
          fill="white"/>
  </svg>
  <span  data-i18n="btn.export_excel">Export Excel</span>
</button>

<button id="btn-save-history"
  type="button"
  data-i18n="btn.save"
  class="inline-flex items-center gap-2 rounded-xl bg-sky-600 px-4 py-2 text-sm font-medium text-white shadow">

  <svg class="hidden h-4 w-4 animate-spin" data-role="spinner"
       xmlns="http://www.w3.org/2000/svg" fill="none"
       viewBox="0 0 24 24">
    <circle class="opacity-25" cx="12" cy="12" r="10"
            stroke="currentColor" stroke-width="4"></circle>
    <path class="opacity-75" fill="currentColor"
          d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/>
  </svg>

  <span data-role="label" data-i18n="btn.save"></span>
</button>
        </div>
      </div>
    </div>
  </div>
</div>
