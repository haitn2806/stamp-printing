/* ===== NEON DOTS ===== */
.neon-dots{
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
}

.neon-dots span{
  position: absolute;
  width: 8px; /* Kích thước lớn hơn để hiệu ứng rõ nét */
  height: 8px; 
  border-radius: 50%;
  filter: blur(2px); /* Làm cho ánh sáng lan tỏa mạnh hơn */
  animation: dotMove 10s linear infinite;
  box-shadow: 0 0 20px, 0 0 30px, 0 0 40px; /* Tạo độ sáng xung quanh */
}

/* Từng dot */
.neon-dots span:nth-child(1){
  background: #22ffe6;
  box-shadow: 0 0 10px #22ffe6, 0 0 20px #22ffe6, 0 0 40px #22ffe6;
  animation-duration: 8s;
}
.neon-dots span:nth-child(2){
  background: #7c7cff;
  box-shadow: 0 0 10px #7c7cff, 0 0 20px #7c7cff, 0 0 40px #7c7cff;
  animation-duration: 9s;
}
.neon-dots span:nth-child(3){
  background: #38bdf8;
  box-shadow: 0 0 10px #38bdf8, 0 0 20px #38bdf8, 0 0 40px #38bdf8;
  animation-duration: 11s;
}
.neon-dots span:nth-child(4){
  background: #a855f7;
  box-shadow: 0 0 10px #a855f7, 0 0 20px #a855f7, 0 0 40px #a855f7;
  animation-duration: 13s;
}

@keyframes dotMove {
  0% { transform: translate(10vw, 15vh); }
  25% { transform: translate(80vw, 20vh); }
  50% { transform: translate(60vw, 80vh); }
  75% { transform: translate(20vw, 60vh); }
  100% { transform: translate(10vw, 15vh); }
}

<script>
async function applyLang(lang) {
  await window.i18n.loadLang(lang);
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    el.textContent = window.i18n.t(el.dataset.i18n);
  });
  localStorage.setItem('app_lang', lang);
}

document.addEventListener('DOMContentLoaded', async () => {
  const savedLang = localStorage.getItem('app_lang') || 'en';
  document.querySelector(`input[name="lang"][value="${savedLang}"]`)?.click();
  await applyLang(savedLang);
});

document.querySelectorAll('input[name="lang"]').forEach(r=>{
  r.addEventListener('change', e=>applyLang(e.target.value));
});

document.getElementById('btn-continue').onclick = () => {
  const lang = document.querySelector('input[name="lang"]:checked')?.value;
  const factory = document.querySelector('input[name="factory"]:checked')?.value;
  if (!factory) return alert('Select factory');
  kbAPI.preloginDone({ lang, factory });
};
</script>
