<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Inspection Warehouse</title>

  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #020617;
      --accent1: #38bdf8;
      --accent2: #6366f1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      background:
        radial-gradient(1200px 600px at top left, rgba(56,189,248,.15), transparent 40%),
        radial-gradient(800px 400px at bottom right, rgba(99,102,241,.15), transparent 40%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: white;
      overflow: hidden;
    }

    .splash {
      text-align: center;
      padding: 40px 48px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(14px);
      box-shadow:
        0 20px 40px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      animation: fadeInUp .8s ease-out;
    }

    .logo {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: .5px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      opacity: .75;
      margin-bottom: 26px;
    }

    .loader {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,.15);
      border-top-color: var(--accent1);
      margin: 0 auto;
      animation: spin 1s linear infinite;
    }

    .loading-text {
      margin-top: 14px;
      font-size: 13px;
      letter-spacing: .15em;
      opacity: .65;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(12px) scale(.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>
</head>
<body>

  <div class="splash">
    <div class="logo">Material Inspection Warehouse</div>
    <div class="subtitle">Quality Control System v.1.4.8 阿海</div>
  <div class="avatar-wrap">
      <img src="./assets/img/avatar.gif" id="avatar">
      </div>
  </div>

</body>
</html>
